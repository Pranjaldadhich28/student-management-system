{% extends "base.html" %}

{% block content %}

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

{% for student in student_data %}

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-semibold mb-2">
{{ student.name }}
</h2>

<p class="text-gray-600">
Phone: {{ student.phone_number }}
</p>

<p class="text-gray-600">
Email: {{ student.email }}
</p>

<div class="mt-4 flex gap-2">

<a href ="{% url 'update_student' student.id %}" class="bg-blue-500 text-white px-3 py-1 rounded">
    Update

</a>

<a href="{% url 'delete_student' student.id %}" class="bg-red-500 text-white px-3 py-1 rounded">
Delete
</a>

</div>

</div>

{% endfor %}

</div>

<div class="flex justify-center mt-10">

<a href="{% url 'add_student' %}" 
class="bg-blue-500 text-white px-6 py-2 rounded-lg">
Add Student
</a>

</div>

{% endblock %}
