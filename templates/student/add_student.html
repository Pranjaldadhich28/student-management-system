{% extends "base.html" %}

{% block content %}

<div class="flex justify-center">

<form method="POST" 
class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

{% csrf_token %}

<h2 class="text-2xl font-bold text-center mb-6">
Add Student
</h2>

<input 
type="text"
name="name"
placeholder="Name"
class="w-full border p-2 rounded mb-4"
required
>

<input 
type="text"
name="phone_number"
placeholder="Phone Number"
class="w-full border p-2 rounded mb-4"
required
>

<input 
type="email"
name="email"
placeholder="Email"
class="w-full border p-2 rounded mb-4"
required
>

<button 
type="submit"
class="bg-blue-500 text-white px-6 py-2 rounded-lg w-full">
Add Student
</button>

</form>

</div>

{% endblock %}
